name: scene-audio

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch (CUDA 12.1 — matches driver 581.83 / RTX 4060 Laptop) ──────────
  - pytorch>=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # ── Scientific stack (prefer conda builds for speed) ────────────────────────
  - numpy>=1.24.0
  - scipy>=1.11.0
  - matplotlib>=3.7.0
  - pillow>=10.0.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  - pyyaml>=6.0
  - tqdm>=4.66.0
  - ffmpeg                    # required by librosa / audio I/O

  # ── Jupyter ─────────────────────────────────────────────────────────────────
  - jupyter
  - ipywidgets                # enables inline Audio / HTML widgets
  - notebook

  # ── pip packages (not on conda or need latest versions) ─────────────────────
  - pip
  - pip:
    # Google Gemini (Nano Banana — Stage 1)
    - google-genai>=0.3.0

    # OpenAI GPT Image 2 (optional alternative image generation backend)
    - openai>=1.0.0

    # Environment variable loading
    - python-dotenv>=1.0.0

    # HuggingFace / Qwen2.5-VL (Stage 3 segmentation)
    - transformers>=4.49.0
    - accelerate>=0.27.0
    - qwen-vl-utils[decord]>=0.0.5

    # DUSt3R — pip subset of dust3r/requirements.txt (torch/torchvision/matplotlib/
    # tqdm/opencv/scipy come from conda above; see dust3r/requirements.txt)
    - einops>=0.7.0
    - roma>=1.5.0
    - gradio>=4.0.0
    - trimesh>=3.0.0
    - tensorboard>=2.14.0
    - "pyglet<2"
    - "huggingface-hub[torch]>=0.22"

    # 3-D reconstruction (COLMAP / Open3D pipeline)
    - pycolmap>=0.6.0
    - open3d>=0.18.0

    # Depth estimation backbone
    - timm>=0.9.0

    # Computer vision
    - opencv-python>=4.8.0

    # 4-bit quantization for Qwen2.5-VL
    - bitsandbytes

    # Audio: gradio-client = optional HF Space fallback for MMAudio.
    # Local MMAudio is NOT a pip line here — clone https://github.com/hkchengrex/MMAudio
    # into <project>/MMAudio (or set MMAUDIO_ROOT), then:  pip install -e ./MMAudio
    - gradio-client>=0.10.0
    - soundfile>=0.12.0
    - librosa>=0.10.0

# ── Optional: 3D Gaussian Splatting env (Nerfstudio splatfacto) ──────────────
# Keep SEPARATE from MVTSG to avoid torch/CUDA version conflicts.
# Run these commands once in a terminal (outside this environment):
#
#   conda create -n nerfstudio python=3.10 -y
#   conda activate nerfstudio
#   pip install torch==2.1.2+cu118 torchvision==0.16.2+cu118 \
#       --index-url https://download.pytorch.org/whl/cu118
#   pip install nerfstudio
#   ns-install-cli
#
# After training completes you can view results with:
#   ns-viewer --load-config <run>/config.yml
#
# Stage 7 in pipeline.ipynb calls Nerfstudio via subprocess
# (conda run -n nerfstudio ns-train splatfacto ...) so the MVTSG kernel
# never needs nerfstudio installed.
# Set  gaussian_splatting.env_name: null  in config.yaml to skip training
# and only generate the transforms.json bridge file.
