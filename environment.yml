name: scene-audio

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch (CUDA 12.1 — matches driver 581.83 / RTX 4060 Laptop) ──────────
  - pytorch>=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # ── Scientific stack (prefer conda builds for speed) ────────────────────────
  - numpy>=1.24.0
  - scipy>=1.11.0
  - matplotlib>=3.7.0
  - pillow>=10.0.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  - pyyaml>=6.0
  - tqdm>=4.66.0
  - ffmpeg                    # required by librosa / audio I/O

  # ── Jupyter ─────────────────────────────────────────────────────────────────
  - jupyter
  - ipywidgets                # enables inline Audio / HTML widgets
  - notebook

  # ── pip packages (not on conda or need latest versions) ─────────────────────
  - pip
  - pip:
    # Google Gemini (Nano Banana — Stage 1)
    - google-genai>=0.3.0

    # OpenAI GPT Image 2 (optional alternative image generation backend)
    - openai>=1.0.0

    # Environment variable loading
    - python-dotenv>=1.0.0

    # HuggingFace / Qwen2.5-VL (Stage 3 segmentation)
    - transformers>=4.49.0
    - accelerate>=0.27.0
    - qwen-vl-utils[decord]>=0.0.5

    # 3-D reconstruction — VGGT (CVPR 2025 Best Paper)
    - git+https://github.com/facebookresearch/vggt.git

    # 3-D reconstruction — supporting libs (also used by VGGT / DUSt3R fallback)
    - pycolmap>=0.6.0
    - open3d>=0.18.0
    - trimesh>=4.0.0      # point-cloud I/O used by VGGT demo utilities

    # Depth estimation backbone (MiDaS — used as fallback when method != vggt)
    - timm>=0.9.0

    # Computer vision
    - opencv-python>=4.8.0

    # 4-bit quantization for Qwen2.5-VL
    - bitsandbytes

    # Audio generation (MMAudio via Gradio Space)
    - gradio-client>=0.10.0
    - soundfile>=0.12.0
    - librosa>=0.10.0
