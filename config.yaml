image_generation:
  backend: "nano_banana"              # "nano_banana" (Gemini) or "openai" (GPT Image 2)
  #backend: "openai"
  # ── Nano Banana (Gemini) settings ──────────────────────────────────────────
  model: "gemini-3.1-flash-image-preview"

  # ── OpenAI GPT Image 2 settings ────────────────────────────────────────────
  openai_model: "gpt-image-2"
  openai_quality: "medium"            # low | medium | high | auto
  openai_size: "1024x1024"            # e.g. 1024x1024, 1536x1024, 1024x1536
  openai_text_model: "gemini"         # "gemini" (uses GEMINI_API_KEY) or "gpt-4o"

  # ── View strategy ───────────────────────────────────────────────────────────
  # "arc"   — Cameras on a horizontal circle around the room centre. Required for
  #            COLMAP feature matching and 3DGS to succeed.
  # "fixed" — Legacy cardinal/corner positions (wider coverage, no overlap guarantee).
  view_strategy: "arc"
  arc_radius_fraction: 0.4  # arc radius as fraction of shorter room dimension (~1.5m in a 4m wide room)

  # ── Shared settings ─────────────────────────────────────────────────────────
  # num_additional_views: minimum for >=60% overlap with 65° HFOV = 12 (30° spacing).
  # Formula: ceil(360 / (2*degrees(arcsin(tan(HFOV/2)*(1-overlap)))))
  # Increase for wider FOV or higher overlap requirement.
  num_additional_views: 12
  output_size: [1440, 1080]
  chain_views: true        # each generated view is fed back as a reference for the next
  output_dir: "data/Nano_banana_output_images"
  use_cache: true          # reuse previously generated images if they exist
  
reconstruction:
  # Reconstruction backend:
  #   "dust3r"     — DUSt3R transformer (recommended; works on AI-generated images,
  #                  no SIFT feature matching required, ~2 GB model auto-downloaded)
  #   "colmap"     — Classic COLMAP SfM (requires real photos with photometric
  #                  consistency; fails on AI-generated images)
  #   "depth_only" — Skip pose estimation; use MiDaS depth + synthetic intrinsics
  method: "dust3r"
  use_depth_model: true     # always run MiDaS for per-pixel depth (used by spatial audio)
  depth_model: "DPT_Large"
  # ── DUSt3R settings ────────────────────────────────────────────────────────
  dust3r_model: "naver/DUSt3R_ViTLarge_BaseDecoder_512_dpt"  # HF model id or local path
  dust3r_img_size: 224      # 224 or 512 (must match model checkpoint)
  dust3r_niter: 150         # global alignment iterations (more = better, slower)
  dust3r_min_conf: 1.5      # confidence threshold for point cloud filtering
  # ── COLMAP settings (only used when method: "colmap") ──────────────────────
  colmap:
    feature_type: "SIFT"
    matching_method: "exhaustive"
    dense_reconstruction: false
  
segmentation:
  model: "Qwen/Qwen2.5-VL-7B-Instruct"
  batch_size: 2
  quantization: "bf16"
  max_pixels: 1280
  min_pixels: 256
  output_format: "json"
  
audio:
  generation_model: "mmaudio"
  clip_duration: 4.0
  sample_rate: 44100
  # true = local clone only (no HF Space GPU); false = try local then HF Space fallback
  use_local_inference: true
  # Optional: path to cloned https://github.com/hkchengrex/MMAudio (else MMAUDIO_ROOT env or <project>/MMAudio)
  # mmaudio_repo: null
  negative_prompt: "music, speech, singing"
  
spatial_audio:
  coordinate_system: "right_handed"
  intensity_falloff: "inverse_square"
  default_intensity: 0.8
  
output:
  save_intermediate: true
  visualization: true
  export_format: ["ply", "json"]
